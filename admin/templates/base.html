<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}後台{% endblock %} — 住海邊的帳篷君</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,'Noto Sans TC',sans-serif;background:#f5f4f2;color:#1c1c1c;font-size:14px;line-height:1.6}
    a{color:#7c6a54;text-decoration:none}
    a:hover{text-decoration:underline}

    .adm-header{background:#222;color:#fff;height:50px;display:flex;align-items:center;padding:0 24px;justify-content:space-between}
    .adm-header h1{font-size:13px;font-weight:400;letter-spacing:.05em}

    .adm-wrap{display:flex;min-height:calc(100vh - 50px)}

    .adm-sidebar{width:176px;background:#fff;border-right:1px solid #e5e2de;padding:20px 0;flex-shrink:0}
    .adm-sidebar .lbl{font-size:10px;letter-spacing:.2em;color:#b0a898;padding:16px 20px 4px;text-transform:uppercase}
    .adm-sidebar a{display:block;padding:9px 20px;font-size:13px;color:#555;border-left:2px solid transparent;transition:all .15s}
    .adm-sidebar a:hover,.adm-sidebar a.on{color:#7c6a54;border-left-color:#7c6a54;background:#fdf9f5;text-decoration:none}

    .adm-main{flex:1;padding:32px;max-width:860px}

    .pg-title{font-size:18px;font-weight:400;margin-bottom:22px}

    .flash{padding:10px 14px;margin-bottom:18px;font-size:13px;border-radius:2px}
    .flash.success{background:#edf7ed;color:#276827;border:1px solid #c5e6c5}
    .flash.error{background:#fdeaea;color:#b52b2b;border:1px solid #f5c6c6}

    .btn{display:inline-block;padding:7px 15px;border-radius:2px;font-size:13px;cursor:pointer;border:none;font-family:inherit}
    .btn-p{background:#7c6a54;color:#fff}.btn-p:hover{background:#5c4e3c;color:#fff;text-decoration:none}
    .btn-o{background:#fff;border:1px solid #d5cfc8;color:#555}.btn-o:hover{background:#f5f2ee;text-decoration:none}
    .btn-s{padding:4px 10px;font-size:12px}
    .btn-del{background:#fdeaea;color:#b52b2b;border:1px solid #f5c6c6}.btn-del:hover{background:#f9d5d5}

    table{width:100%;border-collapse:collapse;background:#fff}
    th,td{padding:10px 14px;border-bottom:1px solid #eee;text-align:left}
    th{font-size:11px;letter-spacing:.1em;color:#999;font-weight:400;background:#fafaf8}
    tr:last-child td{border-bottom:none}
    tr:hover td{background:#fdf9f5}

    .badge{display:inline-block;padding:2px 8px;border-radius:2px;font-size:11px}
    .badge-on{background:#edf7ed;color:#276827}
    .badge-off{background:#f0f0ee;color:#999}
    .badge-type{background:#f0ebe3;color:#7c6a54}

    .card{background:#fff;border:1px solid #e8e2da;padding:24px;border-radius:2px}

    .field{margin-bottom:16px}
    .field label{display:block;font-size:12px;color:#777;margin-bottom:5px;letter-spacing:.03em}
    .field input,.field select,.field textarea{width:100%;padding:8px 11px;border:1px solid #d5cfc8;border-radius:2px;font-size:14px;font-family:inherit;background:#fff;color:#1c1c1c}
    .field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:#7c6a54;box-shadow:0 0 0 2px rgba(124,106,84,.1)}
    .field textarea{resize:vertical;line-height:1.75}
    .field-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .chk{display:flex;align-items:center;gap:8px}
    .chk input{width:auto}
    .chk label{margin-bottom:0;font-size:13px;color:#444}

    .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:28px}
    .stat{background:#fff;border:1px solid #e8e2da;padding:18px;text-align:center}
    .stat-n{font-size:30px;font-weight:300;color:#7c6a54}
    .stat-l{font-size:11px;color:#aaa;margin-top:3px}

    .empty{text-align:center;padding:56px;color:#bbb;font-size:13px}
  </style>
</head>
<body>
<header class="adm-header">
  <h1>住海邊的帳篷君 — 管理後台</h1>
</header>
<div class="adm-wrap">
  <aside class="adm-sidebar">
    <div class="lbl">選單</div>
    <a href="/" {% if request.path == '/' %}class="on"{% endif %}>總覽</a>
    <div class="lbl">內容</div>
    <a href="/voice" {% if 'voice' in request.path %}class="on"{% endif %}>Voice 文章</a>
    <a href="/schedule" {% if 'schedule' in request.path %}class="on"{% endif %}>Schedule 行程</a>
    <a href="/works" {% if 'works' in request.path %}class="on"{% endif %}>有紀通鑑</a>
  </aside>
  <main class="adm-main">
    {% with msgs = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in msgs %}
        <div class="flash {{ cat }}">{{ msg }}</div>
      {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
  </main>
</div>
</body>
</html>
